<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
		<meta name="description" content="Classic 2048 game. Join the tiles, get to 2048!" />
		<meta name="theme-color" content="#faf8ef" />
		<link rel="icon" href="./favicon.svg" type="image/svg+xml" />
		<link rel="apple-touch-icon" href="./apple-touch-icon.png" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="default" />
		<meta name="apple-mobile-web-app-title" content="2048" />
		<title>2048</title>
	</head>
	<body>
		<main class="app">
			<header class="header">
				<h1 class="title">2048</h1>
				<div class="scores">
					<div class="score-box">
						<span class="score-label">SCORE</span>
						<span id="score" class="score-value">0</span>
					</div>
					<div class="score-box">
						<span class="score-label">BEST</span>
						<span id="best" class="score-value">0</span>
					</div>
				</div>
			</header>

			<div class="subheader">
				<p class="tagline">Join the tiles, get to <strong>2048!</strong></p>
				<button id="new-game" class="new-game" type="button">New Game</button>
			</div>

			<div id="board" class="board">
				<div class="grid-background" id="grid-background"></div>
				<div class="tile-layer" id="tile-layer"></div>

				<div id="overlay" class="overlay hidden">
					<p id="overlay-message" class="overlay-message"></p>
					<div class="overlay-actions">
						<button id="overlay-keep" class="overlay-button hidden" type="button">Keep playing</button>
						<button id="overlay-retry" class="overlay-button" type="button">Try again</button>
					</div>
				</div>
			</div>

			<div class="controls" aria-label="Direction controls">
				<button class="ctrl ctrl-up" data-dir="up" type="button" aria-label="Up">▲</button>
				<button class="ctrl ctrl-left" data-dir="left" type="button" aria-label="Left">◀</button>
				<button class="ctrl ctrl-down" data-dir="down" type="button" aria-label="Down">▼</button>
				<button class="ctrl ctrl-right" data-dir="right" type="button" aria-label="Right">▶</button>
			</div>

			<footer class="footer">
				<p>Use arrow keys, swipe, or the buttons to move tiles.</p>
				<p class="credit">
					Made with
					<svg class="heart" xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16" aria-label="love" role="img">
						<path fill-rule="evenodd" d="M8 1.314C12.438-3.248 23.534 4.735 8 15-7.534 4.736 3.562-3.248 8 1.314"/>
					</svg>
					by
					<a href="https://www.linkedin.com/in/jeromeetienne/" target="_blank" rel="noopener noreferrer">Jerome Etienne</a>
				</p>
			</footer>
		</main>

		<script type="module" src="./ts/main.ts"></script>
	</body>
</html>
